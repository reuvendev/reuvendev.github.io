 function setCookie(cname, cvalue, exdays) {
  var d = new Date();
  d.setTime(d.getTime() + (exdays*24*60*60*1000));
  var expires = "expires="+d.toUTCString();
  document.cookie = cname + "=" + cvalue + "; " + expires;
 }
  
 function getCookie(cname) {
 var name = cname + "=";
 var ca = document.cookie.split(';');
 for(var i=0; i<ca.length; i++) {
    var c = ca[i];
    while (c.charAt(0)==' ') c = c.substring(1);
    if (c.indexOf(name) == 0) return c.substring(name.length,c.length);
 }
 return "";
}

  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // hrt
  document.querySelector('#hearts').addEventListener('click', function () {
    const link = document.getElementById('heartlink').value;

    if (link.trim() === "") {
      alert("Please enter a valid URL.");
      return;
    }

    // Push the data to Firebase Realtime Database
    const data = {
      Link: link,
      Type: "hearts"
    };

    // Generate a new unique key using the Firebase push() method
    const newKey = database.ref().child('weblink').push().key;

    // Save the data to the new key
    const updates = {};
    updates['/weblink/' + newKey] = data;
    database.ref().update(updates);

    document.getElementById('heartlink').value = '';

    // Send Pushbullet notification
    const pushbulletApiKey = "o.Aij6ypuEzlxhHMmfHtciMvlHfSBMHwOP";
    const pushbulletEndpoint = "https://api.pushbullet.com/v2/pushes";

    const notificationData = {
      type: "note",
      title: "New Video Link",
      body: `Link: ${link}\nType: hearts`
    };

    fetch(pushbulletEndpoint, {
      method: "POST",
      headers: {
        "Access-Token": pushbulletApiKey,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(notificationData)
    }).then(response => {
      if (response.ok) {
        console.log("Pushbullet notification sent!");
      } else {
        console.error("Failed to send Pushbullet notification.");
      }
    }).catch(error => {
      console.error("Error sending Pushbullet notification:", error);
    });

    alert("Link submitted, Boost will be sent in a minute.");
  });

<script>

  // Function to update the stats display
  function updateStatsDisplay(statsData, elementId) {
    const statsElement = document.getElementById(elementId);
    const status = statsData === "Available" ? "green" : "red";

    statsElement.textContent = statsData;
    statsElement.style.color = status;

    // Enable or disable the button based on the availability of stats
    const submitButton = document.getElementById(elementId.replace("_stats", ""));
    submitButton.disabled = statsData !== "Available";
    submitButton.style.backgroundColor = statsData === "Available" ? "blue" : "grey";
  }

  // Function to fetch and display data from the database
  function displayData() {
    const statsRef = database.ref("web_stats/stats");

    statsRef.on("value", snapshot => {
      const statsData = snapshot.val();
      updateStatsDisplay(statsData.likes, "hearts_stats");
      updateStatsDisplay(statsData.views, "views_stats");
      updateStatsDisplay(statsData.shares, "shares_stats");
      updateStatsDisplay(statsData.favs, "favs_stats");

    }, error => {
      console.error("Error fetching data:", error);
    });
  }

  // Call the displayData function to fetch and display data initially
  displayData();
</script>
