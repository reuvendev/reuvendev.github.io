<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReuvenDev Boost</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #007aff, #353a40);
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .parent-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .form-container {
      max-width: fit-content;
      text-align: center;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      margin-bottom: 10px;
    }
    .form-container input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-bottom: 1px solid #ccc;
      outline: none;
    }
    .form-container button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #007aff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      outline: none;
    }
    .indicator {
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
    .container {
      width: 90%;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div class="parent-container">
    <div class="form-container">
      <h2>ReuvenDev Boost</h2>
      <form id="boostForm">
        <input type="text" placeholder="Video URL" id="videoURLInput">
        <button type="button" id="viewsBtn">Views</button>
        <button type="button" id="sharesBtn">Shares</button>
        <button type="button" id="favsBtn">Favorites</button>
        <button type="button" id="likesBtn">Likes</button>
      </form>
    </div>

    <div class="container">
      <p class="indicator" id="favsIndicator">Favorites: </p>
      <p class="indicator" id="likesIndicator">Likes: </p>
      <p class="indicator" id="sharesIndicator">Shares: </p>
      <p class="indicator" id="viewsIndicator">Views: </p>
    </div>
</div>  
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-analytics.js"></script>
<script>
  // Initialize Firebase with your config
  const firebaseConfig = {

  };
  firebase.initializeApp(firebaseConfig);

</script>

</body>
</html>
