<!DOCTYPE html>
<html>
<head>
  <title>ReuvenDev - Message List</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #007aff, #353a40);
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      margin-bottom: 20px;
      max-width: 400px;
      padding: 20px;
      background-color: white;
      border-radius: 40px;
      animation: fade-in 0.5s ease;
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
        transform: translateY(-20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #353a40;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      margin-bottom: 10px;
    }

    a {
      display: block;
      text-decoration: none;
      color: #007aff;
      font-size: 18px;
    }

    .logo {
      justify-content: center;
      align-items: center;
      display: block;
      max-width: 50%;
      height: auto;
      margin-bottom: 20px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="https://cdn.discordapp.com/attachments/1118462097727172740/1126804989256400937/reuvendevLOGO.png" alt="Logo">
    <h1>Message List</h1>
    <ul id="messageList"></ul>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script>
    // Initialize Firebase
    var config = {
      apiKey: "AIzaSyDNFiqe0ssOma0jB-S36tX0wLpUK9Lt9yw",
      authDomain: "reuvendev-5aa9c.firebaseapp.com",
      databaseURL: "https://reuvendev-5aa9c-default-rtdb.firebaseio.com",
      projectId: "reuvendev-5aa9c",
      storageBucket: "reuvendev-5aa9c.appspot.com",
      messagingSenderId: "892169866046",
      appId: "1:892169866046:web:e01335f66537ee86233a6f",
      measurementId: "G-S1LG8ESHB6"
    };
    firebase.initializeApp(config);

    // Get a reference to the database service
    var database = firebase.database();

    // Retrieve and display message IDs
    var messagesRef = database.ref("messages");
    messagesRef.on("value", function(snapshot) {
      var messageList = document.getElementById("messageList");

      // Clear the message list
      messageList.innerHTML = "";

      // Loop through each message and create a list item with a link
      snapshot.forEach(function(childSnapshot) {
        var messageId = childSnapshot.key;

        var listItem = document.createElement("li");
        var link = document.createElement("a");
        link.href = "msgrvndv.html?messageid=" + messageId; // Redirect to the message HTML page with the corresponding ID
        link.textContent = messageId;

        listItem.appendChild(link);
        messageList.appendChild(listItem);
      });
    }, function(error) {
      console.error("Error retrieving message IDs:", error);
    });
  </script>
</body>
</html>
