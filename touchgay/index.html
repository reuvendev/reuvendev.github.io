<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Touch Game</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }
        .circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: red;
            transform: translate(-50%, -50%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        .locked {
            background-color: blue;
        }
        .chosen {
            background-color: green;
        }
    </style>
</head>
<body>
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDNFiqe0ssOma0jB-S36tX0wLpUK9Lt9yw",
            authDomain: "reuvendev-5aa9c.firebaseapp.com",
            databaseURL: "https://reuvendev-5aa9c-default-rtdb.firebaseio.com",
            projectId: "reuvendev-5aa9c",
            storageBucket: "reuvendev-5aa9c.appspot.com",
            messagingSenderId: "892169866046",
            appId: "1:892169866046:web:e01335f66537ee86233a6f",
            measurementId: "G-S1LG8ESHB6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Ensure the player name is prompted
        let playerName = localStorage.getItem('playerName');
        if (!playerName) {
            playerName = prompt('Enter your name:');
            if (playerName) {
                localStorage.setItem('playerName', playerName);
            } else {
                alert('Name is required to play.');
                location.reload(); // Reload to prompt again
            }
        }

        const circles = {};
        let lockTimeout = null;
        let selectionTimeout = null;

        document.addEventListener('touchstart', function(event) {
            console.log('touchstart event');
            clearTimeout(selectionTimeout);
            for (let i = 0; i < event.touches.length; i++) {
                const touch = event.touches[i];
                if (!circles[touch.identifier]) {
                    createCircle(touch.identifier, touch.clientX, touch.clientY);
                    firebase.database().ref('circles/' + touch.identifier).set({
                        playerName: playerName,
                        x: touch.clientX,
                        y: touch.clientY
                    });
                }
            }
        });

        document.addEventListener('touchmove', function(event) {
            console.log('touchmove event');
            for (let i = 0; i < event.touches.length; i++) {
                const touch = event.touches[i];
                if (circles[touch.identifier]) {
                    updateCircle(touch.identifier, touch.clientX, touch.clientY);
                    firebase.database().ref('circles/' + touch.identifier).update({
                        x: touch.clientX,
                        y: touch.clientY
                    });
                }
            }
        });

        document.addEventListener('touchend', function(event) {
            console.log('touchend event');
            for (let i = 0; i < event.changedTouches.length; i++) {
                const touch = event.changedTouches[i];
                if (circles[touch.identifier]) {
                    removeCircle(touch.identifier);
                    firebase.database().ref('circles/' + touch.identifier).remove();
                }
            }
            if (Object.keys(circles).length === 0) {
                clearTimeout(lockTimeout);
                clearTimeout(selectionTimeout);
            }
        });

        function createCircle(id, x, y) {
            console.log('Creating circle:', id, x, y);
            const circle = document.createElement('div');
            circle.classList.add('circle');
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            circle.dataset.id = id;
            circle.innerHTML = playerName;  // Show player name inside the circle
            document.body.appendChild(circle);
            circles[id] = circle;

            if (lockTimeout) {
                clearTimeout(lockTimeout);
            }
            lockTimeout = setTimeout(() => {
                Object.values(circles).forEach(c => c.classList.add('locked'));
                startSelectionTimer();
            }, 3000);
        }

        function updateCircle(id, x, y) {
            console.log('Updating circle:', id, x, y);
            const circle = circles[id];
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
        }

        function removeCircle(id) {
            console.log('Removing circle:', id);
            const circle = circles[id];
            if (circle) {
                circle.remove();
                delete circles[id];
            }
        }

        function startSelectionTimer() {
            selectionTimeout = setTimeout(() => {
                console.log('Selection timer triggered');
                const circleElements = Object.values(circles);
                if (circleElements.length > 1) {
                    const randomCircle = circleElements[Math.floor(Math.random() * circleElements.length)];
                    circleElements.forEach(c => {
                        if (c !== randomCircle) {
                            const playerName = c.innerHTML;
                            alert(`${playerName} is eliminated!`);
                            c.remove();
                            delete circles[c.dataset.id];
                            firebase.database().ref('circles/' + c.dataset.id).remove();
                        } else {
                            c.classList.add('chosen');
                        }
                    });
                } else if (circleElements.length === 1) {
                    const winner = circleElements[0].innerHTML;
                    alert(`${winner} wins!`);
                }
            }, 3000);
        }

        // Firebase listener for other players' circles
        firebase.database().ref('circles').on('child_added', (data) => {
            const circleData = data.val();
            console.log('Child added:', data.key, circleData);
            if (!circles[data.key]) {
                createCircle(data.key, circleData.x, circleData.y);
                circles[data.key].innerHTML = circleData.playerName;
            }
        });

        firebase.database().ref('circles').on('child_changed', (data) => {
            const circleData = data.val();
            console.log('Child changed:', data.key, circleData);
            if (circles[data.key]) {
                updateCircle(data.key, circleData.x, circleData.y);
            }
        });

        firebase.database().ref('circles').on('child_removed', (data) => {
            console.log('Child removed:', data.key);
            if (circles[data.key]) {
                removeCircle(data.key);
            }
        });
    </script>
</body>
</html>
