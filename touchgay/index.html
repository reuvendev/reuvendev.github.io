<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Touch Game</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden;
        }
        .circle {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: red;
            transform: translate(-50%, -50%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        .locked {
            background-color: blue;
        }
        .chosen {
            background-color: green;
        }
        #leaderboard {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="leaderboard">
        <h3>Leaderboard</h3>
        <ul id="players"></ul>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getDatabase, ref, onChildAdded, onChildChanged, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyDNFiqe0ssOma0jB-S36tX0wLpUK9Lt9yw",
            authDomain: "reuvendev-5aa9c.firebaseapp.com",
            databaseURL: "https://reuvendev-5aa9c-default-rtdb.firebaseio.com",
            projectId: "reuvendev-5aa9c",
            storageBucket: "reuvendev-5aa9c.appspot.com",
            messagingSenderId: "892169866046",
            appId: "1:892169866046:web:e01335f66537ee86233a6f",
            measurementId: "G-S1LG8ESHB6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);

        let playerName = localStorage.getItem('playerName');
        if (!playerName) {
            playerName = prompt('Enter your name:');
            if (playerName) {
                localStorage.setItem('playerName', playerName);
            } else {
                alert('Name is required to play.');
                location.reload();
            }
        }

        const circles = {};
        const players = {};

        // Update leaderboard
        function updateLeaderboard() {
            const playersList = document.getElementById('players');
            playersList.innerHTML = '';
            Object.keys(players).forEach(key => {
                const player = players[key];
                const listItem = document.createElement('li');
                listItem.textContent = player.name + (player.eliminated ? ' (Eliminated)' : '');
                playersList.appendChild(listItem);
            });
        }

        // Listen for new player circles
        onChildAdded(ref(db, 'circles'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const { playerName, x, y } = data;
                if (playerName !== playerName) {
                    const circle = document.createElement('div');
                    circle.classList.add('circle');
                    circle.style.left = `${x}px`;
                    circle.style.top = `${y}px`;
                    circle.innerHTML = playerName;
                    document.body.appendChild(circle);
                    circles[snapshot.key] = circle;

                    // Add player to the leaderboard
                    players[snapshot.key] = { name: playerName, eliminated: false };
                    updateLeaderboard();
                }
            }
        });

        // Listen for changes in player circles
        onChildChanged(ref(db, 'circles'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const { playerName, x, y } = data;
                if (circles[snapshot.key]) {
                    circles[snapshot.key].style.left = `${x}px`;
                    circles[snapshot.key].style.top = `${y}px`;
                }
            }
        });

        // Listen for removed player circles
        onChildRemoved(ref(db, 'circles'), (snapshot) => {
            if (circles[snapshot.key]) {
                circles[snapshot.key].remove();
                delete circles[snapshot.key];

                // Update leaderboard when player is eliminated
                players[snapshot.key].eliminated = true;
                updateLeaderboard();
            }
        });

        document.addEventListener('touchstart', function(event) {
            for (let i = 0; i < event.touches.length; i++) {
                const touch = event.touches[i];
                createCircle(touch.identifier, touch.clientX, touch.clientY);
                db.ref('circles/' + touch.identifier).set({
                    playerName: playerName,
                    x: touch.clientX,
                    y: touch.clientY
                });
            }
        });

        document.addEventListener('touchmove', function(event) {
            for (let i = 0; i < event.touches.length; i++) {
                const touch = event.touches[i];
                if (circles[touch.identifier]) {
                    updateCircle(touch.identifier, touch.clientX, touch.clientY);
                    db.ref('circles/' + touch.identifier).update({
                        x: touch.clientX,
                        y: touch.clientY
                    });
                }
            }
        });

        document.addEventListener('touchend', function(event) {
            for (let i = 0; i < event.changedTouches.length; i++) {
                const touch = event.changedTouches[i];
                if (circles[touch.identifier]) {
                    circles[touch.identifier].remove();
                    delete circles[touch.identifier];
                    db.ref('circles/' + touch.identifier).remove();
                }
            }
        });

        function createCircle(id, x, y) {
            const circle = document.createElement('div');
            circle.classList.add('circle');
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            circle.innerHTML = playerName;
            document.body.appendChild(circle);
            circles[id] = circle;
        }

        function updateCircle(id, x, y) {
            const circle = circles[id];
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
        }
    </script>
</body>
</html>
