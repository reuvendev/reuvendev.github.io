<body>
<div class="container">
  <div class="brand-logo"><img src="https://img.icons8.com/ios-glyphs/100/null/spotify.png"/></div>
  <div class="brand-title">Follower Bot</div>
  <div id="1" class="inputs" style="display: block">
    <label>USERNAME</label>
    <input id="name" type="text" placeholder="31kx************************" />
    <small id="link">Get your Username here</small>
    <label style="display: none;">QUANTITY</label>
    <input style="display: none;" id="quantity" type="text" placeholder="0 - 400" value="1" />
    <button id="btn">SUBMIT</button>
  </div>
  <small>use at your own risk</small>
  <br>
  <small>Last update: 23/12/2022 - 8:42 pm</small>
  <div id="2" style="display: none;"><h3>Botting...</h3></div>
  <a href="https://reuvendev.tech">MADE BY ReuvenDev</a>
</div>

<script type="text/javascript">
document.getElementById("btn").addEventListener("click", async function() {
  var username = document.getElementById("name").value;
  var quantity = document.getElementById("quantity").value;

  document.getElementById("1").style.display = "none";
  document.getElementById("2").style.display = "block";

  const response = await fetch(`https://apifbot.vnzzz.repl.co/?username=${username}&quantity=${quantity}`, {
    method: 'GET',
  });
});

  document.getElementById("link").addEventListener("click", function(event) {
  event.preventDefault(); // Prevent the default link behavior
  window.location = "https://www.spotify.com/ph-en/account/overview";
});
</script>
